<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>經典背誦</title>
  <style>
    :root {
      --bg: #94B5B2;
      --card: #d3dcd8;
      --text: #2f3a3a;
      --btn: #Faf6f1;
      --btn-text: #4a4a4a;
      --accent: #8D6E63;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: var(--card);
      border-radius: 18px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.10);
      padding: 32px 24px;
      text-align: center;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 34px;
      color: #4E342E;
      letter-spacing: 2px;
    }

    .desc {
      font-size: 20px;
      line-height: 1.9;
      margin: 0 0 24px;
    }

    .status {
      font-size: 18px;
      color: #6b7280;
      margin-bottom: 24px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    .btn {
      border: none;
      border-radius: 12px;
      background: var(--btn);
      color: var(--btn-text);
      padding: 12px 18px;
      font-size: 18px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      min-width: 180px;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    .btn-primary {
      background: #c7d9a5;
    }

    .btn-secondary {
      background: #bbc8d8;
    }

    .note {
      margin-top: 22px;
      font-size: 15px;
      line-height: 1.8;
      color: #6b7280;
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 28px;
      }

      .desc {
        font-size: 18px;
      }

      .btn {
        width: 100%;
      }
    }
  </style>

  <script>
    // ===== 你的首頁 GitHub 網址 =====
    const HOME_PAGE_URL = 'https://5mingct.github.io/5mingtest/';

    // ===== 你的 GAS 經典背誦網址 =====
    const CLASSIC_RECITE_GAS_URL = 'https://script.google.com/macros/s/AKfycbxyUssFM9jjVWhGt_nS3yNaOA1j28M2Zqe59bbqu0Awa9ElCWXPm9TGcbDhEGchnIZn/exec';

    function goHome() {
      window.location.href = HOME_PAGE_URL;
    }

    function goClassicRecite() {
      window.location.href = CLASSIC_RECITE_GAS_URL;
    }

    window.onload = function () {
      const status = document.getElementById('statusText');

      if (!CLASSIC_RECITE_GAS_URL) {
        status.textContent = '尚未設定經典背誦網址。';
        return;
      }

      status.textContent = '即將前往經典背誦頁面...';

      // 0.8 秒後自動跳轉
      setTimeout(() => {
        window.location.href = CLASSIC_RECITE_GAS_URL;
      }, 800);
    };
  </script>
</head>
<body>
  <div class="card">
    <h1>經典背誦</h1>
    <p class="desc">
      正在為您開啟經典背誦頁面。<br>
      若未自動跳轉，請按下方按鈕。
    </p>

    <div id="statusText" class="status">準備中...</div>

    <div class="actions">
      <button class="btn btn-primary" onclick="goClassicRecite()">進入經典背誦</button>
      <button class="btn btn-secondary" onclick="goHome()">回主畫面</button>
    </div>

    <div class="note">
      此頁面放在 GitHub，實際背誦功能仍由原本的 Google Apps Script 頁面提供。
    </div>
  </div>
</body>
</html>
